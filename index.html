<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Super Ofertas Brasil</title>
<style>
body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#ff6600;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#333;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.produto{
background:white;
border-radius:10px;
width:200px;
margin:15px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.produto img{
width:100%;
border-radius:10px;
}

.botao{
background:#ff6600;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>Super Ofertas Brasil</h1>
<p>As melhores ofertas da internet</p>
</header>

<nav>
<a href="#">Início</a>
<a href="#">Produtos</a>
<a href="#">Promoções</a>
<a href="#">Contato</a>
</nav>

<div class="container">

<div class="produto">
<img src="https://via.placeholder.com/200">
<h3>Smartphone Android</h3>
<p>R$ 899</p>
<button class="botao">Comprar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<h3>Fone Bluetooth</h3>
<p>R$ 79</p>
<button class="botao">Comprar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<h3>Smartwatch</h3>
<p>R$ 129</p>
<button class="botao">Comprar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<h3>Tênis Esportivo</h3>
<p>R$ 149</p>
<button class="botao">Comprar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<h3>Mouse Gamer</h3>
<p>R$ 49</p>
<button class="botao">Comprar</button>
</div>

</div>

<footer>
<p>© 2026 Super Ofertas Brasil</p>
</footer>

</body>
</html>
